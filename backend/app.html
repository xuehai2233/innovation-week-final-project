<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>影之诗进化对决 AI裁判</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* 头部 */
        .header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo {
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .subtitle {
            font-size: 14px;
            opacity: 0.7;
            margin-top: 5px;
        }

        /* 聊天区域 */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 30px;
            background: #f8f9fa;
        }

        .message {
            margin-bottom: 20px;
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            flex-direction: row-reverse;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
            flex-shrink: 0;
        }

        .message.ai .avatar {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .message.user .avatar {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            color: white;
        }

        .bubble {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.6;
            word-wrap: break-word;
            white-space: pre-wrap;
        }

        .message.ai .bubble {
            background: white;
            color: #333;
            border: 1px solid #e0e0e0;
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-top-right-radius: 4px;
        }

        /* 输入区域 */
        .input-area {
            padding: 20px 30px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            gap: 15px;
            align-items: flex-end;
        }

        .input-wrapper {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            min-height: 50px;
            max-height: 150px;
            padding: 14px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 25px;
            font-size: 15px;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
            font-family: inherit;
        }

        textarea:focus {
            border-color: #667eea;
        }

        .send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, box-shadow 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        /* 快速提问按钮 */
        .quick-questions {
            display: flex;
            gap: 8px;
            padding: 10px 30px;
            background: #f0f0f5;
            flex-wrap: wrap;
        }

        .quick-btn {
            padding: 6px 14px;
            border: 1px solid #667eea;
            border-radius: 16px;
            background: white;
            color: #667eea;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: #667eea;
            color: white;
        }

        /* 加载动画 */
        .typing {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: white;
            border-radius: 18px;
            border-top-left-radius: 4px;
            width: fit-content;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #999;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing span:nth-child(1) { animation-delay: -0.32s; }
        .typing span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .empty-state h3 {
            font-size: 18px;
            margin-bottom: 10px;
            color: #666;
        }

        /* 滚动条 */
        .chat-container::-webkit-scrollbar {
            width: 6px;
        }

        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-container::-webkit-scrollbar-thumb {
            background: #ccc;
            border-radius: 3px;
        }

        /* 响应式 */
        @media (max-width: 600px) {
            .container {
                height: 100vh;
                border-radius: 0;
            }
            
            .chat-container {
                padding: 15px;
            }
            
            .input-area {
                padding: 15px;
            }
            
            .bubble {
                max-width: 85%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>
                <div class="logo">⚖️</div>
                影之诗进化对决 AI裁判
            </h1>
            <p class="subtitle">基于本地大模型的游戏规则裁判系统</p>
        </div>

        <!-- 快速提问 -->
        <div class="quick-questions">
            <button class="quick-btn" onclick="quickAsk('进化后攻击力怎么计算？')">进化攻击力</button>
            <button class="quick-btn" onclick="quickAsk('守护是什么意思？')">守护机制</button>
            <button class="quick-btn" onclick="quickAsk('主牌组最少需要多少张牌？')">牌组规则</button>
            <button class="quick-btn" onclick="quickAsk('入场曲和谢幕曲有什么区别？')">入场曲vs谢幕曲</button>
        </div>

        <!-- 聊天区域 -->
        <div class="chat-container" id="chatContainer">
            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                </svg>
                <h3>开始提问吧！</h3>
                <p>我是影之诗进化对决的专属裁判助手</p>
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    placeholder="输入你的裁判问题... (Shift+Enter换行，Enter发送)"
                    rows="1"
                ></textarea>
            </div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="22" y1="2" x2="11" y2="13"></line>
                    <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const emptyState = document.getElementById('emptyState');

        // 自动调整输入框高度
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });

        // 键盘事件
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // 快速提问
        function quickAsk(question) {
            userInput.value = question;
            sendMessage();
        }

        // 发送消息
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;

            // 隐藏空状态
            emptyState.style.display = 'none';

            // 添加用户消息
            addMessage(message, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';

            // 禁用发送按钮
            sendBtn.disabled = true;

            // 显示加载动画
            const loadingId = showLoading();

            try {
                // 调用真实后端 API
                const response = await callJudgeApi(message);
                
                // 移除加载动画
                removeLoading(loadingId);
                
                // 添加AI回复
                addMessage(response, 'ai');
            } catch (error) {
                removeLoading(loadingId);
                addMessage('抱歉，裁判系统暂时不可用。\n请确认：\n1. 后端已启动 (uvicorn main:app --port 8000)\n2. Ollama 服务正在运行', 'ai');
            }

            // 启用发送按钮
            sendBtn.disabled = false;
            userInput.focus();
        }

        // 添加消息到界面
        function addMessage(content, role) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = role === 'ai' ? '裁' : '你';
            
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = content;
            
            messageDiv.appendChild(avatar);
            messageDiv.appendChild(bubble);
            chatContainer.appendChild(messageDiv);
            
            // 滚动到底部
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 显示加载动画
        function showLoading() {
            const id = 'loading-' + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = id;
            loadingDiv.className = 'message ai';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.textContent = '裁';
            
            const typing = document.createElement('div');
            typing.className = 'typing';
            typing.innerHTML = '<span></span><span></span><span></span>';
            
            loadingDiv.appendChild(avatar);
            loadingDiv.appendChild(typing);
            chatContainer.appendChild(loadingDiv);
            
            chatContainer.scrollTop = chatContainer.scrollHeight;
            return id;
        }

        // 移除加载动画
        function removeLoading(id) {
            const loading = document.getElementById(id);
            if (loading) loading.remove();
        }

        // 调用真实后端 API
        async function callJudgeApi(message) {
            const API_URL = 'http://localhost:8000/api/judge';
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: message })
            });
            
            if (!response.ok) {
                throw new Error('API 返回错误: ' + response.status);
            }
            
            const data = await response.json();
            return data.answer || '裁判未返回有效回答';
        }

        // 初始焦点
        userInput.focus();
    </script>
</body>
</html>
